name: app_android
description: "Monitoraggio IA Personale: Sistema di sicurezza e controllo hardware."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Libreria fondamentale per la comunicazione WebSocket con il server Python
  web_socket_channel: ^3.0.1
  # Libreria per la sintesi vocale (Text-to-Speech)
  flutter_tts: ^4.0.2
  # Utilizzato per la conversione JSON dei dati ricevuti
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true