name: app_android
description: "Monitoraggio IA Personale: Sistema di sicurezza, controllo hardware e apprendimento proattivo."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Comunicazione in tempo reale col server Python
  web_socket_channel: ^3.0.1
  
  # Sintesi vocale per le risposte dell'IA (Fallback)
  flutter_tts: ^4.0.2
  
  # Gestione dei file per caricare foto e documenti
  file_picker: ^8.0.0
  
  # Icone standard Material Design
  cupertino_icons: ^1.0.6

  # Riproduzione audio ad alta qualità (MP3 neurale) dal server SIA
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true